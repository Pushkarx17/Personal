<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checklist · Pushkar Kodigehalli Umesh</title>
  <meta name="description" content="Personal to-do checklist.">
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100..800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="page page-narrow">

    <header class="fade-item" style="animation-delay:.05s">
      <h1 class="name">Check<span class="dim">list</span></h1>
    </header>

    <p class="back-link fade-item" style="animation-delay:.1s">
      <a href="index.html" class="arrow-link back"><span class="underline-text">back home</span></a>
    </p>

    <div class="terminal checklist fade-item" style="animation-delay:.2s" aria-label="personal to-do checklist">
      <div class="term-line"><span class="prompt">$</span> cat todo.txt</div>

      <ul class="todo-list" id="todo-list"></ul>

      <form class="todo-form todo-auth" id="todo-auth" hidden>
        <span class="prompt" aria-hidden="true">$</span>
        <input type="password" id="todo-token" class="todo-input" placeholder="sync token…" autocomplete="current-password" aria-label="sync token">
        <button type="submit" class="todo-add">unlock</button>
      </form>

      <form class="todo-form" id="todo-form">
        <span class="prompt" aria-hidden="true">$</span>
        <input type="text" id="todo-input" class="todo-input" placeholder="new task…" autocomplete="off" maxlength="120" aria-label="new task">
        <button type="submit" class="todo-add">add</button>
      </form>

      <div class="todo-status" id="todo-status"></div>
    </div>

    <footer class="page-footer fade-item" style="animation-delay:.35s">
      &copy; 2026 Pushkar Kodigehalli Umesh.
    </footer>
  </div>

  <script src="todo.js"></script>
</body>
</html>
